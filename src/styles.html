<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
/* ===== LIGHT DESIGN SYSTEM ===== */
--bg:#F5F1EB;--bg2:#fff;--bg3:#F8F5F0;--bg4:#EAE6E0;
--text:#1C1A17;--text1:#1C1A17;--text2:#5C564F;--text3:#8A8278;
--accent:#C6A85E;--accent2:#B89543;--accent-dim:rgba(198,168,94,.10);
--rose:#c4929a;--rose-dim:rgba(196,146,154,.10);
--champagne:#e8d5b7;
--red:#B85C5C;--red-dim:rgba(184,92,92,.10);
--green:#5E8B6F;--green-dim:rgba(94,139,111,.10);
--blue:#6A86A8;--blue-dim:rgba(106,134,168,.10);
--border:#E8E1D8;--border2:rgba(198,168,94,.25);
--glass:rgba(245,241,235,.92);
--r:14px;--r2:10px;--r3:18px;
--font-ui:'DM Sans','Inter',system-ui,-apple-system,sans-serif;
--font-body:'Inter','DM Sans',system-ui,-apple-system,sans-serif;
--font-serif:'Cormorant Garamond',Georgia,'Times New Roman',serif;
/* ===== DARK SPOTLIGHT ===== */
--ink:#111318;--ink-soft:#1A1D24;
--shadow-soft:0 2px 6px rgba(0,0,0,.04);
--shadow-hover:0 6px 16px rgba(0,0,0,.08);
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;-webkit-tap-highlight-color:transparent;font-size:16px;line-height:1.6;font-weight:400;letter-spacing:.01em}
.serif{font-family:var(--font-serif);font-weight:600}
a{color:var(--accent);text-decoration:none;transition:color .2s}
a:hover{color:var(--accent2)}
.hidden{display:none!important}


/* ===== LANDING PAGE TABS ===== */
.lp-tab{display:none}
.lp-tab-active{display:block}
.lp-tab-link.active{color:var(--accent)!important;font-weight:500}

/* ===== LANDING PAGE (DARK THEME SCOPE) ===== */
#pg-landing{
--bg:#09090e;--bg2:#0f0f16;--bg3:#16161f;--bg4:#1e1e29;
--text:#f0ece6;--text1:#f0ece6;--text2:#ccc8c2;--text3:#9a958e;
--accent:#c8a87c;--accent2:#dfc19f;--accent-dim:rgba(200,168,124,.10);
--red:#c44d56;--green:#8bb8a0;--blue:#8badc4;
--border:rgba(200,168,124,.08);--border2:rgba(200,168,124,.15);
--glass:rgba(9,9,14,.92);
--r:12px;--r2:10px;--r3:20px;
color:var(--text);background:var(--bg);
}
#pg-landing .btn-a{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#09090e}
#pg-landing .btn-a:hover{background:linear-gradient(135deg,var(--accent2),var(--accent))}
#pg-landing .btn-g{color:var(--text2);border-color:var(--border2)}
#pg-landing .card{background:var(--bg2);border-color:var(--border);box-shadow:none;backdrop-filter:blur(4px)}
#pg-landing .plan{background:var(--bg2);border-color:var(--border)}
#pg-landing .plan.ft{background:linear-gradient(160deg,var(--bg2),rgba(200,168,124,.03));border-color:var(--border2)}
#pg-landing .plan.pop::before{color:#09090e}

/* ===== TOP NAV ===== */
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:20px 32px;background:transparent;backdrop-filter:blur(0px);-webkit-backdrop-filter:blur(0px);border-bottom:1px solid transparent;transition:all .5s ease}
.topbar.solid{background:rgba(9,9,14,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom-color:rgba(200,168,124,.08)}
.topbar-logo{display:flex;align-items:center;gap:12px;cursor:pointer}
.topbar-logo .logo-mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;transition:transform .3s}
.topbar-logo:hover .logo-mark{transform:scale(1.05)}
.topbar-logo .logo-mark svg{width:18px;height:18px;fill:#1C1A17}
.topbar-logo .logo-text{font-family:var(--font-serif);font-size:22px;font-weight:600;color:#f0ece6;letter-spacing:.5px}
.topbar-links{display:flex;gap:28px;align-items:center}
.topbar-links a{font-size:13px;font-weight:400;color:#ccc8c2;transition:color .3s;letter-spacing:.5px}
.topbar-links a:hover{color:#c8a87c}
.topbar-links .tb-cta{background:transparent;color:#c8a87c;padding:9px 22px;border-radius:100px;font-weight:500;font-size:11px;letter-spacing:1px;text-transform:uppercase;transition:all .35s;border:1px solid #c8a87c}
.topbar-links .tb-cta:hover{background:#c8a87c;color:#09090e}
.landing-menu{position:absolute;top:calc(100% + 12px);left:0;background:rgba(9,9,14,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(200,168,124,.15);border-radius:12px;padding:8px 0;min-width:200px;box-shadow:0 12px 40px rgba(0,0,0,.4);z-index:300}
.landing-menu a{display:block;padding:10px 20px;font-size:13px;color:#ccc8c2;font-weight:400;transition:all .2s;letter-spacing:.3px}
.landing-menu a:hover{background:rgba(200,168,124,.10);color:#c8a87c}
.topbar-logo .logo-mark{cursor:pointer}
@media(max-width:640px){
  .topbar{padding:16px 20px}
  .topbar-links a.tb-link{display:none}
  .topbar-links .tb-cta{padding:8px 16px;font-size:10px}
}
@media(max-width:380px){
  .topbar-links .tb-cta{padding:6px 12px;font-size:9px;letter-spacing:.5px}
  #trial-countdown-banner{margin:12px 16px 0!important;padding:12px 14px!important}
  #trial-countdown-banner .btn-sm{padding:6px 14px!important;font-size:10px!important}
}

/* ===== SPLASH ===== */
#splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s ease}
#splash.out{opacity:0;pointer-events:none}
.sp-mark{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;margin-bottom:24px;box-shadow:0 0 80px rgba(198,168,94,.12)}
.sp-mark svg{width:32px;height:32px;fill:#1C1A17}
.sp-t{font-family:var(--font-serif);font-size:32px;font-weight:600;letter-spacing:1px;margin-bottom:8px}
.sp-s{font-size:11px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;font-weight:400;font-family:var(--font-ui)}

/* ===== NOTIFICATION ===== */
.notif{position:fixed;top:20px;left:20px;right:20px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px 20px;z-index:2000;display:flex;align-items:center;gap:12px;transform:translateY(-120%);transition:transform .4s ease;box-shadow:0 16px 48px rgba(0,0,0,.12)}
.notif.show{transform:translateY(0)}.notif.err{border-color:var(--red)}
.notif-t{font-size:13px;font-weight:400;flex:1}

/* ===== BUTTONS ===== */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px;border:none;border-radius:100px;font-size:14px;font-weight:600;font-family:var(--font-ui);cursor:pointer;transition:all .35s ease;letter-spacing:.6px;text-transform:uppercase;width:100%}
.btn-a{background:var(--accent);color:#1C1A17;box-shadow:0 4px 20px rgba(198,168,94,.15)}
.btn-a:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(198,168,94,.25)}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-g:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{width:auto;padding:10px 24px;font-size:11px}
.btn-lock{background:var(--bg4);color:var(--text3);cursor:not-allowed;box-shadow:none}

/* ===== FORMS ===== */
.fg{margin-bottom:22px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;font-family:var(--font-ui)}
.fg input,.fg select,.fg textarea{width:100%;padding:14px 18px;background:#fff;border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:16px;font-family:var(--font-body);outline:none;transition:all .3s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(198,168,94,.15)}
.fg input::placeholder,.fg textarea::placeholder{color:var(--text3);font-weight:300}
.fg select{appearance:none;cursor:pointer}

/* ===== BOTTOM NAV ===== */
.nav{position:sticky;top:0;left:0;right:0;background:#111318;border-bottom:none;display:flex;justify-content:space-around;padding:10px 0;z-index:200}
.ni{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:9px;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;padding:8px 12px;background:none;border:none;transition:color .25s;letter-spacing:.8px;text-transform:uppercase;font-family:var(--font-ui)}
.ni.on,.ni:hover{color:var(--accent)}
.ni svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* ===== HEADER (app) ===== */
.hdr{padding:20px 24px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;background:#111318;border-bottom:1px solid rgba(255,255,255,.06)}
.hdr-t{font-family:var(--font-serif);font-size:26px;font-weight:600;letter-spacing:.3px;color:#fff}
.hdr-back{font-family:var(--font-ui);font-size:13px;color:var(--text3);background:none;border:none;cursor:pointer;padding:0;margin-right:12px;transition:color .2s}
.hdr-back:hover{color:var(--accent)}
.badge{font-size:9px;padding:5px 14px;border-radius:100px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;font-family:var(--font-ui)}
.b-free{background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)}.b-core{background:rgba(106,134,168,.2);color:#6A86A8}.b-pro{background:rgba(198,168,94,.15);color:var(--accent)}.b-ment{background:rgba(198,168,94,.15);color:var(--accent)}.b-admin{background:rgba(94,139,111,.2);color:#5E8B6F}

/* ===== CARDS ===== */
.card{background:var(--bg2);border-radius:var(--r);padding:24px;margin-bottom:12px;border:1px solid var(--border);transition:all .35s ease;box-shadow:var(--shadow-soft)}
.card:hover{border-color:var(--border2);box-shadow:0 4px 24px rgba(0,0,0,.15)}
.sec{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:2px;padding:28px 24px 14px;font-family:var(--font-ui)}

/* ===== TAGS ===== */
.tag{font-size:9px;padding:4px 12px;border-radius:100px;font-weight:600;letter-spacing:1px;text-transform:uppercase;display:inline-block;font-family:var(--font-ui)}
.t-student{background:var(--green-dim);color:var(--green)}.t-resident{background:var(--blue-dim);color:var(--blue)}.t-fellow{background:var(--accent-dim);color:var(--accent)}.t-cat{background:var(--bg4);color:var(--text3);font-size:10px;letter-spacing:.5px}.t-reviewed{background:var(--green-dim);color:var(--green)}.t-pending{background:var(--accent-dim);color:var(--accent)}

.scr{display:none}.scr.on{display:block}
#dash-scores{grid-template-columns:repeat(4,1fr)}
@media(max-width:360px){#dash-scores{grid-template-columns:repeat(2,1fr)}}

/* ========== LANDING ========== */
.lp{overflow-y:auto;min-height:100vh;position:relative}

/* Hero */
.hero{padding:160px 32px 100px;text-align:center;position:relative;overflow:hidden;background:var(--bg)}
.hero::before{content:'';position:absolute;top:-120px;right:-80px;width:600px;height:600px;background:radial-gradient(ellipse,rgba(198,168,94,.06),transparent 70%);border-radius:50%;pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-150px;left:-100px;width:500px;height:500px;background:radial-gradient(ellipse,rgba(196,146,154,.04),transparent 70%);border-radius:50%;pointer-events:none}
.hero *{position:relative}
.hero-badge{display:inline-block;padding:8px 20px;border-radius:100px;background:transparent;color:var(--accent);font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;border:1px solid var(--border2)}
.hero h1{font-family:var(--font-serif);font-size:42px;font-weight:600;line-height:1.15;margin-bottom:24px;letter-spacing:.3px}
@media(min-width:600px){.hero h1{font-size:54px}}
.hero h1 em{font-style:italic;color:var(--accent)}
.hero p{color:var(--text2);font-size:16px;line-height:1.8;max-width:460px;margin:0 auto 44px;font-weight:300;letter-spacing:.01em}

/* Landing sections */
.lp-sec{padding:80px 32px}
@media(max-width:480px){.lp-sec{padding:60px 20px}}
/* Why HeartWise — comparison table mobile */
@media(max-width:520px){
  .hw-cmp-row{grid-template-columns:1fr !important}
  .hw-cmp-row>div:nth-child(2),
  .hw-cmp-row>div:nth-child(3){border-left:none !important;border-top:1px solid var(--border)}
  #why-stage-tabs{flex-wrap:nowrap;gap:0}
  #why-stage-tabs .why-stage-btn{font-size:10px !important;padding:10px 6px !important}
}
.lp-sec h2{font-family:var(--font-serif);font-size:36px;font-weight:600;margin-bottom:14px;text-align:center;letter-spacing:.3px}
@media(max-width:480px){.lp-sec h2{font-size:28px}}
.lp-sec .sub{color:var(--text3);font-size:14px;text-align:center;margin-bottom:44px;line-height:1.8;max-width:440px;margin-left:auto;margin-right:auto;font-weight:300;letter-spacing:.01em}

/* Divider */
.lp-divider{width:48px;height:1px;background:var(--accent);margin:0 auto 44px;opacity:.4}

.who-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:500px;margin:0 auto}
.who-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:28px 20px;text-align:center;transition:all .4s ease}
.who-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 12px 40px rgba(198,168,94,.06)}
.who-card .icon{font-size:28px;margin-bottom:12px}
.who-card h3{font-size:14px;font-weight:600;margin-bottom:8px;letter-spacing:.2px}
.who-card p{font-size:12px;color:var(--text3);line-height:1.6;font-weight:300}

.master-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;max-width:500px;margin:0 auto}
@media(max-width:400px){.master-grid{grid-template-columns:1fr 1fr;gap:10px}}
.master-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:22px;text-align:center;transition:all .4s ease}
.master-item:hover{border-color:var(--accent);transform:translateY(-2px)}
.master-item .icon{font-size:22px;margin-bottom:10px}
.master-item h3{font-size:12px;font-weight:500;letter-spacing:.3px}

/* Flow Roadmap */
.flow-road{display:flex;align-items:flex-start;justify-content:center;gap:0;padding:12px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.flow-node{display:flex;flex-direction:column;align-items:center;text-align:center;min-width:85px;max-width:105px;flex-shrink:0}
.flow-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px;border:1px solid var(--border);transition:all .4s ease;background:var(--bg3)}
.flow-node:hover .flow-icon{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 24px rgba(198,168,94,.08)}
.flow-label{font-size:11px;font-weight:600;color:var(--text);margin-bottom:5px;white-space:nowrap;letter-spacing:.3px}
.flow-desc{font-size:10px;color:var(--text3);line-height:1.5;font-weight:300}
.flow-arrow{display:flex;align-items:center;padding-top:18px;flex-shrink:0}
@media(max-width:520px){.flow-road{padding:8px 4px}.flow-node{min-width:64px;max-width:75px}.flow-icon{width:44px;height:44px;border-radius:11px;font-size:18px}.flow-label{font-size:10px}.flow-desc{font-size:9px}.flow-arrow svg{width:26px;height:18px}}

/* ===== PRICING ===== */
.plan{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:36px 32px;margin-bottom:16px;transition:all .4s ease}
.plan:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 12px 48px rgba(0,0,0,.2)}
.plan.ft{border-color:var(--border2);background:linear-gradient(160deg,var(--bg2),rgba(198,168,94,.04))}
.plan.pop{border-color:var(--accent);position:relative}
.plan.pop::before{content:'RECOMMENDED';position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--accent);color:#1C1A17;font-size:9px;font-weight:600;padding:4px 16px;border-radius:100px;letter-spacing:1.5px}
.plan-n{font-size:16px;font-weight:600;margin-bottom:6px;letter-spacing:.3px;font-family:var(--font-ui)}
.plan-p{font-family:var(--font-serif);font-size:44px;font-weight:600;margin-bottom:4px;letter-spacing:-1px}
.plan-p span{font-size:14px;font-weight:400;color:var(--text3);font-family:var(--font-body)}
.plan-f{list-style:none;padding:0;margin:22px 0}
.plan-f li{padding:8px 0;font-size:14px;color:var(--text2);display:flex;align-items:flex-start;gap:12px;line-height:1.7;font-weight:300}
.plan-f li::before{content:'✦';color:var(--accent);font-size:9px;margin-top:4px;flex-shrink:0}

/* Usage */
.usage{background:var(--bg4);border-radius:999px;height:6px;overflow:hidden;margin-top:6px}
.usage-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;transition:width .6s ease}
.usage-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:5px}

/* AI Response */
.ai-resp{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:16px}
.ai-resp h4{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin:18px 0 10px;display:flex;align-items:center;gap:8px;font-family:var(--font-ui)}
.ai-resp h4:first-child{margin-top:0}
.ai-resp p,.ai-resp li{font-size:15px;color:var(--text2);line-height:1.75;font-weight:300}
.ai-resp ol{padding-left:20px;margin:8px 0}
.ai-resp .escalate{margin-top:18px;padding:14px 18px;border-radius:var(--r2);background:var(--accent-dim);border:1px solid rgba(198,168,94,.12);font-size:13px;color:var(--accent)}

/* Vault */
.quiz-opt:hover{border-color:rgba(198,168,94,.4)!important;transform:translateY(-1px)}
.vault-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:12px;display:flex;align-items:center;gap:16px;transition:all .35s ease}
.vault-card .v-icon{width:44px;height:44px;border-radius:12px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.vault-card .v-info{flex:1;min-width:0}.vault-card .v-info h3{font-size:15px;font-weight:600;margin-bottom:3px;font-family:var(--font-ui);line-height:1.4}.vault-card .v-info p{font-size:13px;color:var(--text3);font-weight:300;line-height:1.5}
.vault-card .v-lock{color:var(--text3);font-size:18px}
.vault-card.unlocked{border-color:var(--accent);cursor:pointer}
.vault-card.unlocked:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(198,168,94,.08)}
.vault-card.unlocked .v-lock{color:var(--accent)}

/* Question cards */
.qc{background:var(--bg2);border-radius:var(--r);padding:24px;margin-bottom:12px;border:1px solid var(--border);transition:all .35s ease;cursor:pointer}
.qc:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.15)}
.qc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.qc-author{font-size:11px;color:var(--text3);font-weight:400;letter-spacing:.3px}
.qc-q{font-size:16px;font-weight:400;line-height:1.65;margin-bottom:14px}
.qc-meta{display:flex;gap:12px;font-size:11px;color:var(--text3);align-items:center;flex-wrap:wrap}

/* Admin */
.admin-tabs{display:flex;padding:0 24px;gap:6px;border-bottom:1px solid var(--border);overflow-x:auto}
.atab{padding:14px 16px;font-size:10px;font-weight:600;color:var(--text3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .25s;letter-spacing:1px;text-transform:uppercase;font-family:var(--font-ui);white-space:nowrap}
.atab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tier-sw{font-size:11px;padding:5px 12px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text3);font-weight:600;transition:all .2s}
.tier-sw:hover{border-color:var(--accent);color:var(--accent)}
.adm-metric{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;text-align:center}
.adm-metric .num{font-size:24px;font-weight:700;color:var(--text);font-family:var(--font-serif)}
.adm-metric .lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.adm-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px}
.adm-table{width:100%;border-collapse:collapse;font-size:12px}
.adm-table th{text-align:left;padding:10px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);border-bottom:1px solid var(--border)}
.adm-table td{padding:10px 8px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:top}
.adm-table tr:hover{background:var(--bg3)}
.adm-filter{font-size:11px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text);margin-right:6px}
.abox{background:#fff;border-radius:var(--r2);padding:18px;margin-top:14px;border:1px solid var(--border)}
.abox textarea{width:100%;background:transparent;border:none;color:var(--text);font-size:14px;resize:vertical;min-height:100px;outline:none;font-family:var(--font-body);line-height:1.65}

/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(12px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r3);padding:36px;max-width:440px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 12px 60px rgba(0,0,0,.4)}
.modal h2{font-family:var(--font-serif);font-size:26px;margin-bottom:18px;font-weight:600}
.modal p,.modal li{font-size:14px;color:var(--text2);line-height:1.75;margin-bottom:8px;font-weight:300}
.modal ul{padding-left:18px}

/* Chips */
.fc{display:flex;gap:8px;padding:0 24px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.fc::-webkit-scrollbar{display:none}
.chip{padding:8px 18px;border-radius:100px;font-size:11px;font-weight:500;background:var(--bg3);border:1px solid var(--border);cursor:pointer;transition:all .25s;color:var(--text2);white-space:nowrap;font-family:var(--font-ui);letter-spacing:.3px}
.chip.on{background:var(--accent-dim);border-color:var(--border2);color:var(--accent)}

/* Search */
.sbar{margin:20px 24px;position:relative}
.sbar input{width:100%;padding:14px 18px 14px 46px;background:#fff;border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:14px;font-family:var(--font-body);outline:none;transition:all .3s}
.sbar input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(198,168,94,.15)}
.sbar svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:1.5}

/* Misc */
.check-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;font-size:14px;color:var(--text2);font-weight:300}
.check-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent);flex-shrink:0;margin-top:2px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 24px;margin-bottom:20px}
.st{background:var(--bg2);border-radius:var(--r);padding:20px 14px;text-align:center;border:1px solid var(--border)}
.st-n{font-family:var(--font-serif);font-size:28px;font-weight:600;letter-spacing:-.5px}
.st-l{font-size:9px;color:var(--text3);margin-top:6px;text-transform:uppercase;letter-spacing:1.5px;font-weight:500;font-family:var(--font-ui)}
.pad{padding:0 24px 100px}
.tog{width:44px;height:24px;background:var(--bg4);border-radius:12px;position:relative;cursor:pointer;transition:background .3s;border:1px solid var(--border);flex-shrink:0}
.tog.on{background:var(--accent);border-color:var(--accent)}
.tog::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .3s ease;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.tog.on::after{transform:translateX(20px)}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
@keyframes hookFadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(198,168,94,.3)}50%{box-shadow:0 0 12px 4px rgba(198,168,94,.15)}}
@keyframes drawLine{from{height:0}to{height:100%}}
@keyframes countUp{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.fade-in{animation:fadeUp .5s ease both}
.reveal{opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* How It Works steps */
.hiw-step{opacity:0;transform:translateX(-16px);transition:opacity .5s ease,transform .5s ease}
.hiw-step.visible{opacity:1;transform:translateX(0)}
.hiw-step:nth-child(1){transition-delay:.1s}
.hiw-step:nth-child(2){transition-delay:.3s}
.hiw-step:nth-child(3){transition-delay:.5s}
.hiw-step:nth-child(4){transition-delay:.7s}
.hiw-num{animation:countUp .4s ease both}
.hiw-step.visible .hiw-num{animation:countUp .4s ease both,pulseGlow 2s ease-in-out infinite}
.hiw-line{position:absolute;left:17px;top:0;width:2px;background:linear-gradient(180deg,var(--accent),rgba(198,168,94,.1));transform-origin:top;animation:drawLine 1.2s ease .2s both}
.hiw-icon-float{animation:fadeIn .6s ease both;transition:transform .3s}
.hiw-step:hover .hiw-icon-float{transform:scale(1.15)}

/* Safe areas */
@supports(padding-top:env(safe-area-inset-top)){.hdr{padding-top:calc(20px + env(safe-area-inset-top))}.hero{padding-top:calc(160px + env(safe-area-inset-top))}.topbar{padding-top:calc(20px + env(safe-area-inset-top))}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(198,168,94,.15);border-radius:3px}
.intake-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.intake-grid .fg{margin-bottom:12px}
.review-banner{background:var(--accent-dim);border:1px solid rgba(198,168,94,.12);border-radius:var(--r2);padding:18px;margin-bottom:22px;display:flex;align-items:center;gap:14px}
.review-banner .icon{font-size:20px}.review-banner .info{flex:1}.review-banner .info h4{font-size:12px;font-weight:500;color:var(--accent);margin-bottom:3px;letter-spacing:.3px}.review-banner .info p{font-size:11px;color:var(--text3);font-weight:300}
.prof-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
.prof-stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;text-align:center}
/* Tool cards */
.tool-grid{display:grid;grid-template-columns:1fr;gap:12px}
.tool-card{display:flex;gap:16px;align-items:flex-start;padding:22px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);transition:all .4s ease}
.tool-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 28px rgba(198,168,94,.06)}
.tool-icon{width:44px;height:44px;border-radius:12px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tool-info h3{font-size:16px;font-weight:600;margin-bottom:5px;letter-spacing:.2px;font-family:var(--font-ui)}
.tool-info p{font-size:13px;color:var(--text3);line-height:1.6;font-weight:300}

/* Onboarding */
.onboard{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.ob-step{max-width:440px;width:100%;text-align:center;position:relative}
.ob-step h2{font-family:var(--font-serif);font-size:28px;font-weight:600;margin-bottom:12px}
.ob-step p{font-size:15px;color:var(--text2);margin-bottom:32px;line-height:1.7;font-weight:300}
.ob-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:32px}
.ob-opt{padding:20px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .3s;text-align:center}
.ob-opt:hover,.ob-opt.sel{border-color:var(--accent);background:var(--accent-dim)}
.ob-opt .ob-emoji{font-size:24px;margin-bottom:8px}
.ob-opt .ob-label{font-size:14px;font-weight:500}

/* Leverage quiz */
.lev-opt{padding:8px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;font-family:var(--font-body)}
.lev-opt:hover{border-color:var(--accent);color:var(--text)}
.lev-opt.sel{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:600}
.lev-wf-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px;cursor:pointer;transition:all .25s}
.lev-wf-card:hover{border-color:rgba(198,168,94,.3);transform:translateY(-1px)}
.lev-wf-card.expanded{border-color:rgba(198,168,94,.25)}
.lev-wf-detail{display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.lev-wf-card.expanded .lev-wf-detail{display:block}
.lev-prompt{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:13px;color:var(--text2);font-family:'SF Mono',SFMono-Regular,Consolas,monospace;line-height:1.6;margin:10px 0;position:relative}
.lev-filter{padding:7px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;color:var(--text3);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:var(--font-body)}
.lev-filter:hover{border-color:var(--accent);color:var(--text)}
.lev-filter.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:600}
.lev-tried-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.lev-output{background:rgba(92,184,154,.04);border:1px solid rgba(92,184,154,.15);border-radius:10px;padding:14px 16px;margin:10px 0}
.lev-output li{font-size:13px;color:var(--text2);padding:3px 0;line-height:1.5}
.lev-tip{background:rgba(198,168,94,.06);border:1px solid rgba(198,168,94,.12);border-radius:10px;padding:14px 16px;margin-top:12px;font-size:13px;color:var(--text2);line-height:1.6}

/* Competitive score */
.score-ring{width:120px;height:120px;border-radius:50%;border:4px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;position:relative}
.score-ring .score-val{font-family:var(--font-serif);font-size:42px;font-weight:600}
.score-ring .score-label{position:absolute;bottom:-8px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;background:var(--bg);padding:0 8px}

/* Report sections */
.report-sec{text-align:left;padding:20px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px}
.report-sec h4{font-size:11px;font-weight:500;color:var(--accent);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}
.report-sec p,.report-sec li{font-size:14px;color:var(--text2);line-height:1.7;font-weight:300}
.report-sec ul{padding-left:16px}

/* Strength/gap bars */
.metric-bar{margin-bottom:14px}
.metric-bar .mb-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.metric-bar .mb-top .mb-label{color:var(--text2);font-weight:400}
.metric-bar .mb-top .mb-val{color:var(--accent);font-weight:500}
.metric-bar .mb-track{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.metric-bar .mb-fill{height:100%;border-radius:3px;transition:width .8s ease}

.prof-stat .n{font-family:var(--font-serif);font-size:24px;font-weight:600}.prof-stat .l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:3px;font-weight:500;font-family:var(--font-ui)}

/* ========== LUXURY HERO ========== */
.hero-lux{
  background:#F6F3EE;
  padding:140px 48px 80px;
  position:relative;
  overflow:hidden;
}
.hero-lux-inner{
  max-width:1120px;
  margin:0 auto;
  display:grid;
  grid-template-columns:1fr 420px;
  gap:64px;
  align-items:start;
}
.hero-lux-text{
  position:relative;
  padding-top:24px;
}
.hero-lux-badge{
  display:inline-block;
  font-size:11px;
  font-weight:500;
  letter-spacing:3px;
  text-transform:uppercase;
  color:#C6A75E;
  margin-bottom:32px;
  font-family:var(--font-ui);
}
.hero-lux-h1{
  font-family:var(--font-serif);
  font-size:60px;
  font-weight:600;
  line-height:1.1;
  color:#1A1A1A;
  letter-spacing:-.5px;
  margin-bottom:28px;
}
.hero-lux-h1 em{
  font-style:italic;
  color:#C6A75E;
}
.hero-lux-sub{
  font-size:17px;
  line-height:1.8;
  color:#4A4A4A;
  font-weight:300;
  max-width:480px;
  margin-bottom:44px;

.hero-lux-ctas{

  gap:16px;

}
.hero-btn-primary{

  padding:16px 36px;
  background:#C6A75E;
  color:#1A1A1A;
  border:none;
  border-radius:100px;
  font-size:13px;
  font-weight:600;
  font-family:var(--font-ui);
  letter-spacing:.8px;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .35s ease;
}
.hero-btn-primary:hover{
  background:#B89B5E;
  transform:translateY(-2px);

}
.hero-btn-secondary{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:16px 36px;
  background:transparent;
  color:#1A1A1A;
  border:1px solid #1A1A1A;
  border-radius:100px;
  font-size:13px;
  font-weight:600;
  font-family:var(--font-ui);
  letter-spacing:.8px;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .35s ease;
}
.hero-btn-secondary:hover{
  background:#1A1A1A;
  color:#F6F3EE;
}
.hero-lux-fine{
  font-size:12px;
  color:#8A857E;
  font-weight:300;
  letter-spacing:.02em;
}
.hero-lux-steps{
  margin-bottom:24px;
  padding:20px 0;
}
.hero-lux-steps-label{
  font-size:11px;
  font-weight:500;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:#C6A75E;
  margin-bottom:16px;
  font-family:var(--font-ui);
}
.hero-lux-steps-row{
  display:flex;
  align-items:center;
  gap:12px;
}
.hero-lux-step{
  display:flex;
  align-items:center;
  gap:10px;
}
.hero-lux-step-num{
  width:28px;
  height:28px;
  border-radius:50%;
  border:1.5px solid #C6A75E;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:600;
  color:#C6A75E;
  flex-shrink:0;
  font-family:var(--font-ui);
}
.hero-lux-step-text{
  font-size:13px;
  font-weight:500;
  color:#1A1A1A;
  line-height:1.4;
  text-align:left;
}
.hero-lux-step-sub{
  display:block;
  font-size:11px;
  font-weight:300;
  color:#4A4A4A;

}
.hero-lux-step-arrow{
  flex-shrink:0;
}
.hero-lux-portrait{
  display:flex;

  align-items:center;
}
.hero-lux-img-wrap{
  width:380px;

  border-radius:12px;

}
.hero-lux-img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:top center;
  display:block;
}
.hero-lux-img-fallback{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:var(--font-serif);
  font-size:72px;
  font-weight:600;
  color:#C6A75E;
  background:linear-gradient(160deg,#E8E4DD,#DDD8D0);
}
.hero-lux-credentials{
  text-align:center;
}
.hero-lux-name{
  font-family:var(--font-serif);
  font-size:18px;
  font-weight:600;
  color:#1A1A1A;
  margin-bottom:6px;
  letter-spacing:.2px;
}
.hero-lux-title{
  font-size:12px;
  color:#4A4A4A;
  font-weight:400;
  letter-spacing:.8px;
  line-height:1.7;
}
.hero-lux-rule{

  height:1px;
  background:linear-gradient(90deg,transparent,rgba(198,167,94,.3),transparent);
}
.hero-lux-meet-mobile{

  justify-content:center;

}
.hero-lux-meet-mobile .hero-btn-secondary{

}

/* Hero responsive */
@media(max-width:900px){
  .hero-lux{padding:120px 32px 60px}
  .hero-lux-inner{
    grid-template-columns:1fr;
    gap:48px;
    text-align:center;
    align-items:center;
  }
  .hero-lux-text{padding-top:0}
  .hero-lux-h1{font-size:44px}
  .hero-lux-sub{margin-left:auto;margin-right:auto}
  .hero-lux-ctas{justify-content:center;flex-wrap:wrap}
  .hero-lux-portrait{order:1}
  .hero-lux-img-wrap{width:280px;height:340px}
  .hero-lux-ctas .hero-btn-secondary{display:none}
  .hero-lux-meet-mobile{display:flex}
  .hero-lux-steps-row{flex-direction:column;align-items:flex-start;gap:10px}
  .hero-lux-steps{text-align:left}
  .hero-lux-step-arrow{transform:rotate(90deg);margin-left:8px}
}
@media(min-width:901px) and (max-width:1100px){
  .hero-lux-inner{grid-template-columns:1fr 340px;gap:48px}
  .hero-lux-h1{font-size:50px}
  .hero-lux-img-wrap{width:320px;height:400px}
}
@media(max-width:480px){
  .hero-lux{padding:100px 20px 48px}
  .hero-lux-h1{font-size:36px}
  .hero-lux-sub{font-size:15px}
  .hero-lux-ctas{flex-direction:column;gap:12px}
  .hero-btn-primary,.hero-btn-secondary{width:100%;justify-content:center}
  .hero-lux-img-wrap{width:220px;height:270px}
}

/* Topbar on light hero */
.topbar.on-light{background:rgba(246,243,238,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom-color:rgba(26,26,26,.08)}
.topbar.on-light .logo-text{color:#1A1A1A}
.topbar.on-light .logo-mark{background:linear-gradient(135deg,#C6A75E,#D4B96E)}
.topbar.on-light .topbar-links a{color:#4A4A4A}
.topbar.on-light .topbar-links a:hover{color:#C6A75E}
.topbar.on-light .topbar-links .tb-cta{color:#C6A75E;border-color:#C6A75E}
.topbar.on-light .topbar-links .tb-cta:hover{background:#C6A75E;color:#1A1A1A}

/* ===== PREMIUM SECTION SPACING ===== */
.lp-sec{padding:100px 32px}
@media(max-width:480px){.lp-sec{padding:72px 20px}}
.lp-sec h2{font-size:42px;margin-bottom:18px}
@media(max-width:480px){.lp-sec h2{font-size:32px}}
.lp-sec .sub{font-size:16px;margin-bottom:56px;max-width:480px}
.lp-divider{margin:0 auto 56px}

/* ===== GLASS TOOL CARDS ===== */
.glass-tool{
  background:linear-gradient(160deg,rgba(22,22,31,.95),rgba(15,15,22,.98));
  border:1px solid rgba(198,168,94,.1);
  border-radius:20px;
  padding:0;
  margin-bottom:32px;
  overflow:hidden;
  transition:all .5s cubic-bezier(.23,1,.32,1);
  position:relative;
}
.glass-tool::before{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:linear-gradient(160deg,rgba(198,168,94,.06),transparent 40%);
  pointer-events:none;opacity:0;transition:opacity .5s ease;
}
.glass-tool:hover{
  border-color:rgba(198,168,94,.25);
  transform:translateY(-6px);
  box-shadow:0 24px 64px rgba(0,0,0,.35),0 0 80px rgba(198,168,94,.06);
}
.glass-tool:hover::before{opacity:1}
.glass-tool-header{padding:36px 32px 0}
.glass-tool-body{padding:0 32px 32px}
.glass-tool-mock{
  padding:24px;
  margin:20px 0 0;
  background:rgba(0,0,0,.4);
  border:1px solid rgba(198,168,94,.06);
  border-radius:14px;
  position:relative;
